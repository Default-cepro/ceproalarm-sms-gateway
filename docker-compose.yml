services:
  sms-gateway:
    build: .
    container_name: ceproalarm-sms-gateway
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    environment:
      SMS_GATE_SERVER_HOST: 0.0.0.0
      SMS_GATE_SERVER_PORT: 8000
      SMS_GATE_LOG_PATH: /tmp/app.log
      SMS_GATE_LOCAL_API_ENABLED: "1"
      SMS_GATE_LOCAL_API_BASE_URL: http://host.docker.internal:18080
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
